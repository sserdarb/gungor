kind = "web"
previewPath = "/"
title = "Güngör Yalıtım Web Sitesi"
version = "1.0.0"
id = "artifacts/gungor-yalitim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25733

[services.development]
run = "pnpm --filter @workspace/gungor-yalitim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gungor-yalitim", "run", "build" ]
publicDir = "artifacts/gungor-yalitim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25733"
BASE_PATH = "/"
